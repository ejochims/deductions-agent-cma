# Deductions Desk UI theme — values from the validated reference palette
# (warm-neutral surfaces, single blue accent, near-black ink).
[theme]
base = "light"
primaryColor = "#2a78d6"          # accent: categorical blue slot 1
backgroundColor = "#f4f3ee"       # page plane (matches the deck's tokens)
secondaryBackgroundColor = "#eceadf"  # widget/secondary plane (neutral gray)
textColor = "#16150f"             # primary ink
linkColor = "#1c5cab"
font = "sans serif"
baseRadius = "10px"
borderColor = "#e2e1da"           # hairline
showWidgetBorder = true

[server]
headless = true

[browser]
gatherUsageStats = false
